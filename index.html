<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👻 Ghost Chat</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
overflow:hidden;
color:#fff;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* Background Smoke */
.smoke{
position:absolute;
width:250px;
height:250px;
background:radial-gradient(circle,rgba(255,255,255,.2),transparent 70%);
border-radius:50%;
animation:smoke 12s linear infinite;
filter:blur(25px);
}

.smoke:nth-child(1){
left:10%;
bottom:-150px;
animation-delay:0s;
}

.smoke:nth-child(2){
left:50%;
bottom:-180px;
animation-delay:3s;
}

.smoke:nth-child(3){
left:80%;
bottom:-150px;
animation-delay:6s;
}

@keyframes smoke{
0%{
transform:translateY(0) scale(.7);
opacity:.1;
}
100%{
transform:translateY(-900px) scale(2);
opacity:0;
}
}

/* Fire Glow */
.fire{
position:absolute;
bottom:0;
width:100%;
height:120px;
background:radial-gradient(circle at center,#ff0000,#ff6600,#000 70%);
filter:blur(35px);
animation:fire 1s infinite alternate;
}

@keyframes fire{
from{
opacity:.5;
}
to{
opacity:1;
transform:scaleY(1.2);
}
}

.chat{
position:relative;
z-index:5;
width:380px;
background:rgba(20,20,20,.88);
padding:20px;
border-radius:15px;
box-shadow:0 0 30px red;
backdrop-filter:blur(6px);
}

h2{
text-align:center;
color:#00ffcc;
margin-bottom:15px;
text-shadow:0 0 10px cyan;
}

#messages{
height:300px;
overflow-y:auto;
border:1px solid #333;
padding:10px;
border-radius:10px;
background:#111;
margin-bottom:10px;
}

.user{
color:#7CFC00;
margin:8px 0;
}

.ghost{
color:#ff5555;
font-style:italic;
margin:8px 0;
animation:flicker .5s;
}

@keyframes flicker{
0%,100%{opacity:1;}
50%{opacity:.4;}
}

input{
width:74%;
padding:10px;
border:none;
border-radius:6px;
background:#222;
color:white;
}

button{
padding:10px 14px;
border:none;
background:#990000;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:red;
}
</style>
</head>

<body>

<div class="smoke"></div>
<div class="smoke"></div>
<div class="smoke"></div>

<div class="fire"></div>

<div class="chat">

<h2>👻 Chat With The Ghost 👻</h2>

<div id="messages">
<div class="ghost">👻 I have been waiting...</div>
</div>

<input id="msg" placeholder="Say something...">

<button onclick="send()">
Send
</button>

</div>

<script>

const replies=[

"👻 I see your shadow...",
"💀 Don't turn around...",
"☠ Someone is standing behind you...",
"👁 I know your secret...",
"🕯 The darkness remembers...",
"👻 Leave before midnight...",
"🩸 I hear whispers...",
"😈 The walls are watching...",
"🌑 Your fate is near...",
"🦇 The night never sleeps...",
"👻 I am closer than you think...",
"💀 I never left this place..."
];

function send(){

const input=document.getElementById("msg");

if(input.value.trim()=="") return;

const box=document.getElementById("messages");

box.innerHTML+=`<div class="user">🙂 You: ${input.value}</div>`;

input.value="";

setTimeout(()=>{

let r=replies[Math.floor(Math.random()*replies.length)];

box.innerHTML+=`<div class="ghost">${r}</div>`;

box.scrollTop=box.scrollHeight;

document.body.style.animation="shake .2s";

setTimeout(()=>{
document.body.style.animation="";
},300);

},1000);

}

const style=document.createElement("style");

style.innerHTML=`
@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-4px);}
100%{transform:translateX(0);}
}
`;

document.head.appendChild(style);

</script>

</body>
</html>
