<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Syndicate</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:#000;
color:white;
overflow-x:hidden;
background-image:url('https://images.unsplash.com/photo-1514565131-fce0801e5785?auto=format&fit=crop&w=1600&q=80');
background-size:cover;
background-position:center;
}

.overlay{
background:rgba(0,0,0,.75);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

h1{
font-family:'Cinzel',serif;
font-size:70px;
letter-spacing:8px;
color:#d10000;
text-shadow:0 0 20px red;
}

p{
margin-top:20px;
font-size:22px;
color:#ddd;
max-width:700px;
}

button{
margin-top:40px;
padding:15px 40px;
font-size:18px;
background:#8b0000;
border:none;
color:white;
cursor:pointer;
border-radius:5px;
transition:.3s;
}

button:hover{
background:#ff0000;
transform:scale(1.08);
box-shadow:0 0 20px red;
}

.fog{
position:fixed;
bottom:0;
width:100%;
height:250px;
background:radial-gradient(circle,#ffffff22,transparent 70%);
animation:fog 12s linear infinite;
opacity:.35;
}

@keyframes fog{
0%{transform:translateX(-40%);}
100%{transform:translateX(40%);}
}
</style>

</head>
<body>

<div class="overlay">

<div>

<h1>SHADOW SYNDICATE</h1>

<p>
Every shadow hides a secret.<br>
Every choice has a price.
</p>

<button onclick="enter()">
ENTER THE STORY
</button>

</div>

</div>

<div class="fog"></div>

<script>
function enter(){
alert("Welcome to the world of Shadow Syndicate. This is a fictional cinematic experience.");
}
</script>

</body>
</html>
