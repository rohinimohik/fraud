<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>👻 Ghost Chat</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- CRT Overlay -->
<div class="crt"></div>

<!-- Smoke -->
<div class="smoke smoke1"></div>
<div class="smoke smoke2"></div>
<div class="smoke smoke3"></div>
<div class="smoke smoke4"></div>

<!-- Fire -->
<div class="fire"></div>

<!-- Blood -->
<div class="blood blood1"></div>
<div class="blood blood2"></div>
<div class="blood blood3"></div>

<!-- Lightning -->
<div id="lightning"></div>

<!-- Ghost Jump Scare -->
<div id="ghostJump">

<img src="ghost.png" alt="Ghost">

</div>

<!-- Horror Emojis -->
<div id="emojiContainer"></div>

<!-- Main Chat -->

<div class="container">

<h1 id="title">
👻 CHAT WITH THE GHOST 👻
</h1>

<div id="chat">

<div class="ghost">

💀 Welcome...

</div>

<div class="ghost">

👁️ I have been waiting for you...

</div>

</div>

<div class="typing" id="typing">

The ghost is whispering...

</div>

<div class="inputBox">

<input
id="msg"
type="text"
placeholder="Type your message..."
autocomplete="off"
>

<button id="send">

Send

</button>

</div>

</div>

<!-- Horror Sound -->

<audio id="whisper">

<source src="whisper.mp3" type="audio/mpeg">

</audio>

<audio id="thunder">

<source src="thunder.mp3" type="audio/mpeg">

</audio>

<audio id="scream">

<source src="scream.mp3" type="audio/mpeg">

</audio>

<script src="script.js"></script>

</body>
</html>
