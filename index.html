<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☠ Dark Magic Calculator ☠</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
overflow:hidden;
color:white;
}

body::before{
content:"";
position:absolute;
width:300%;
height:300%;
background:
radial-gradient(circle,#ff000022 2px,transparent 2px);
background-size:60px 60px;
animation:move 20s linear infinite;
}

@keyframes move{
from{transform:translate(0,0);}
to{transform:translate(-300px,-300px);}
}

.card{
position:relative;
background:#111;
padding:35px;
border-radius:15px;
text-align:center;
box-shadow:0 0 40px red;
z-index:2;
width:340px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 0 20px red;}
to{box-shadow:0 0 50px crimson;}
}

h1{
color:#ff4444;
margin-bottom:20px;
animation:glitch .8s infinite;
}

@keyframes glitch{
0%{transform:translate(0);}
25%{transform:translate(-2px,2px);}
50%{transform:translate(2px,-2px);}
75%{transform:translate(-2px,-1px);}
100%{transform:translate(0);}
}

input{
width:120px;
padding:10px;
margin:8px;
font-size:18px;
border:none;
border-radius:6px;
text-align:center;
}

button{
padding:12px 22px;
margin-top:15px;
font-size:17px;
background:darkred;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
background:red;
}

#result{
margin-top:25px;
font-size:24px;
font-weight:bold;
color:#00ff99;
min-height:35px;
}

.ghost{
position:absolute;
font-size:30px;
animation:float linear infinite;
opacity:.7;
}

@keyframes float{
from{
transform:translateY(110vh);
}
to{
transform:translateY(-120vh);
}
}
</style>
</head>

<body>

<div class="card">

<h1>☠ DARK MAGIC ☠</h1>

<p>Enter two numbers...</p>

<input id="a" type="number" placeholder="First">

<input id="b" type="number" placeholder="Second">

<br>

<button onclick="magic()">
✨ Cast Spell ✨
</button>

<div id="result"></div>

</div>

<script>
const horror=[
"💀",
"👻",
"☠",
"🕷️",
"🩸",
"😈",
"🧛",
"🦇"
];

for(let i=0;i<35;i++){

let g=document.createElement("div");

g.className="ghost";

g.innerHTML=horror[Math.floor(Math.random()*horror.length)];

g.style.left=Math.random()*100+"vw";

g.style.animationDuration=(6+Math.random()*10)+"s";

g.style.fontSize=(20+Math.random()*30)+"px";

g.style.animationDelay=Math.random()*8+"s";

document.body.appendChild(g);

}

function magic(){

let a=Number(document.getElementById("a").value);

let b=Number(document.getElementById("b").value);

if(isNaN(a)||isNaN(b)){
document.getElementById("result").innerHTML="👻 The spirits demand numbers!";
return;
}

// Intentionally wrong calculation for a prank/demo
let fake=(a+b)*13-7;

const messages=[
`☠ The cursed answer is <b>${fake}</b> 💀`,
`👻 Evil spirits changed reality: <b>${fake}</b>`,
`😈 The haunted calculator whispers <b>${fake}</b>`,
`🩸 Reality has glitched... Result: <b>${fake}</b>`
];

document.getElementById("result").innerHTML=
messages[Math.floor(Math.random()*messages.length)];

document.body.style.animation="shake .15s 4";

setTimeout(()=>{
document.body.style.animation="";
},700);

}

const style=document.createElement("style");
style.innerHTML=`
@keyframes shake{
0%{transform:translate(0);}
25%{transform:translate(-5px,3px);}
50%{transform:translate(5px,-3px);}
75%{transform:translate(-4px,-2px);}
100%{transform:translate(0);}
}`;
document.head.appendChild(style);

</script>

</body>
</html>
