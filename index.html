<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Wizard's Scam-O-Matic ✨</title>
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#1a0033,#4b0082,#000);
    color:white;
    text-align:center;
    overflow:hidden;
}
h1{
    margin-top:50px;
    font-size:3rem;
    text-shadow:0 0 15px gold;
}
.magic{
    font-size:80px;
    animation:float 2s infinite ease-in-out;
}
button{
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:gold;
    cursor:pointer;
    margin-top:20px;
}
button:hover{
    transform:scale(1.1);
}
#result{
    margin-top:30px;
    font-size:24px;
    color:#00ffcc;
}
@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-20px);}
}
.star{
    position:absolute;
    color:yellow;
    animation:fall linear infinite;
}
@keyframes fall{
    from{transform:translateY(-100px);}
    to{transform:translateY(110vh);}
}
</style>
</head>
<body>

<div class="magic">🧙‍♂️✨</div>

<h1>Wizard's Scam-O-Matic</h1>

<p><strong>100% Fake. 0% Real.</strong></p>
<p>Click below to reveal your magical fortune!</p>

<button onclick="magic()">Cast Spell</button>

<div id="result"></div>

<script>
const fortunes = [
"🪄 You almost won 999,999 dragon coins... almost.",
"🐉 A unicorn has reported your browser for being too awesome.",
"🧙 The crystal ball says: Try again after eating pizza.",
"✨ Congratulations! You have been selected... for absolutely nothing.",
"🍕 Magic predicts snacks are in your future."
];

function magic(){
    document.getElementById("result").innerHTML =
        fortunes[Math.floor(Math.random()*fortunes.length)];
}

for(let i=0;i<80;i++){
    let s=document.createElement("div");
    s.className="star";
    s.innerHTML="✨";
    s.style.left=Math.random()*100+"vw";
    s.style.animationDuration=(3+Math.random()*6)+"s";
    s.style.animationDelay=Math.random()*5+"s";
    s.style.fontSize=(10+Math.random()*25)+"px";
    document.body.appendChild(s);
}
</script>

</body>
</html>
